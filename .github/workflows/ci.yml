name: Tests

on:
  pull_request:
    branches:
      - main

jobs:
  style:
    runs-on: ubuntu-latest
    name: Check Style
    env:
      MIX_ENV: test
      CI: "true"
    steps:
      - uses: actions/checkout@v2
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.19'
      - run: mix deps.get --only dev
      - run: mix format --check-formatted
      - run: mix credo --strict

  test:
    runs-on: ubuntu-latest
    name: Tests on oldest version
    env:
      MIX_ENV: test
      CI: "true"
    steps:
      - uses: actions/checkout@v2
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '25'
          elixir-version: '1.17'
      - run: rm mix.lock
      - run: mix deps.get
      - run: mix compile --force --warnings-as-errors
      - run: mix test --warnings-as-errors

  test_different_versions:
    runs-on: ubuntu-latest
    name: Tests on different versions
    env:
      MIX_ENV: test
      CI: "true"
    steps:
      - uses: actions/checkout@v2
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.19'
      - run: rm mix.lock
      - run: mix deps.get
      - run: mix compile --force --warnings-as-errors
      - run: mix blend.get
      - run: BLEND=phoenix_live_view_v1_0 mix deps.get && mix test
      - run: BLEND=phoenix_live_view_v1_1 mix deps.get && mix test
